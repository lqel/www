<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%25 y=%2255%25 font-size=%2260%25 font-family=%22HarmonyOS Sans Regular%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22black%22>/A</text></svg>">
    <title>Home / Anthvia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'HarmonyOS Sans Regular', 'HarmonyOS Sans', sans-serif;
            font-weight: 400;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* 初始：屏幕居中 | 5秒后：移动到左上角 */
        .center-text {
            font-size: 8vw;
            color: #000000;
            letter-spacing: 0.06em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
        }

        /* 5秒后移动到左上角 */
        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            clip-path: inset(12% 0 12% 0);
            animation: slashSlant 7s ease-in-out infinite;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes slashSlant {
            0%   { opacity: 1; transform: translate(0, 0) translateZ(0); }
            14%  { opacity: 1; transform: translate(0, 0) translateZ(0); }
            18%  { opacity: 0; transform: translate(15vw, -36vw) translateZ(0); }
            24%  { opacity: 0; transform: translate(-15vw, 36vw) translateZ(0); }
            28.5%{ opacity: 1; transform: translate(0, 0) translateZ(0); }
            100% { opacity: 1; transform: translate(0, 0) translateZ(0); }
        }

        .footer-text {
            position: absolute;
            color: #000000;
            bottom: 25%;
            text-align: left;
        }

        /* 左下：始终隐藏 */
        .left-bottom {
            left: 2rem;
            font-size: 1.2rem;
            opacity: 0;
            line-height: 1.5;
            pointer-events: none;
        }

        /* 右下邮箱：初始显示，移动后隐藏 */
        .right-bottom {
            right: 2rem;
            padding-top: 0.2em;
            font-size: 0.9rem;
            opacity: 1;
            transition: opacity 1s ease;
        }
        .right-bottom.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="center-text">
        ANTHV<span class="slash">/</span>A
    </div>

    <div class="footer-text left-bottom">
        一点星尘（深圳）科技有限公司<br>
        Anthvia Limited
    </div>
    
    <div class="footer-text right-bottom" id="email"></div>

    <script>
      // 邮箱
      document.getElementById("email").innerText = "contact" + "@" + "anthvia.com";

      // 5秒后执行：移动LOGO + 隐藏右下角邮箱
      setTimeout(() => {
        document.querySelector('.center-text').classList.add('moved');
        document.querySelector('.right-bottom').classList.add('hidden');
      }, 5000);
    </script>
</body>
</html>
