<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUO / LUO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
        }

        /* 锁定你要的 LUO 字体，绝对不动 */
        .center-text {
            font-size: 8vw;
            letter-spacing: 0.1em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
            font-family: "Comic Sans MS", "Arial Rounded MT Bold", "Helvetica Rounded", sans-serif;
            font-weight: 900;
            
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #c9f4ff, #a1c4fd);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bgShift 8s ease infinite;
        }

        @keyframes bgShift {
            0%{background-position: 0% 50%}
            50%{background-position: 100% 50%}
            100%{background-position: 0% 50%}
        }

        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            font-family: "Comic Sans MS", "Arial Rounded MT Bold", sans-serif !important;
            animation: slashSlant 7s ease-in-out infinite;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #a1c4fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding-bottom: 0.1em;
            line-height: 1.2 !important;
        }

        @keyframes slashSlant {
            0%   { opacity: 1; transform: translate(0, 0); }
            14%  { opacity: 1; transform: translate(0, 0); }
            18%  { opacity: 0; transform: translate(15vw, -36vw); }
            24%  { opacity: 0; transform: translate(-15vw, 36vw); }
            28.5%{ opacity: 1; transform: translate(0, 0); }
            100% { opacity: 1; transform: translate(0, 0); }
        }

        .main-info {
            position: absolute;
            right: 2rem;
            bottom: 2rem;
            font-size: 1.15rem;
            opacity: 1;
            transition: opacity 1s ease;
            font-family: "YouYuan", "幼圆", sans-serif !important;
            font-weight: 500;
            background: linear-gradient(45deg, #ff85a2, #74b6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            z-index: 888;
        }
        .main-info.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .nav-link {
            position: absolute;
            top: 52%;
            font-size: 1.35rem;
            font-family: "YouYuan", "幼圆", sans-serif !important;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            z-index: 888;
            padding: 12px 26px;
            border-radius: 50px;
            background: linear-gradient(120deg, #ff99cc, #a0c4ff);
            box-shadow: 0 6px 15px rgba(255, 153, 204, 0.25);
        }
        .nav-link.show {
            opacity: 1;
        }
        .nav-link:hover {
            transform: scale(1.05);
        }
        .nav-left {
            left: 8%;
        }
        .nav-right {
            right: 8%;
        }

        .photo-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .photo {
            position: absolute;
            object-fit: cover;
            opacity: 0;
            border-radius: 50%;
            transition: opacity 2s ease;
            transform-origin: center;
        }

        .photo.show {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="center-text">
        LUO<span class="slash">/</span>LUO
    </div>

    <div class="main-info">洛宝家的礼物相关..</div>

    <a href="https://www.kdocs.cn/l/cpOS6o0WxM5F" target="_blank" class="nav-link nav-left">积分查询</a>
    <a href="https://f.wps.cn/g/zuMcXanF/" target="_blank" class="nav-link nav-right">礼物登记</a>

    <div class="photo-wrapper" id="photoWrapper"></div>

    <script>
        const images = [];
        for (let i = 0; i < 14; i++) {
            images.push(`images/${String.fromCharCode(97 + i)}.jpg`);
        }

        setTimeout(() => {
            document.querySelector('.center-text').classList.add('moved');
            document.querySelector('.main-info').classList.add('hidden');
            setTimeout(initPhotos, 1000);
        }, 5000);

        // 🔥 核心修改：左上角 30% 区域禁止放图片，其他位置铺满
        function initPhotos() {
            const wrapper = document.getElementById('photoWrapper');
            const total = images.length;
            const cols = 4;
            const rows = Math.ceil(total / cols);
            const cellW = 100 / cols;
            const cellH = 100 / rows;
            
            const imgSize = Math.max(window.innerWidth, window.innerHeight) / 2.2;

            for (let i = 0; i < total; i++) {
                const img = document.createElement('img');
                img.src = images[i];
                img.className = 'photo';
                img.style.width = imgSize + 'px';
                img.style.height = imgSize + 'px';

                let posX, posY;
                // 🔥 避开左上角：x>30% 或 y>30%
                do {
                    posX = Math.random() * 100;
                    posY = Math.random() * 100;
                } while (posX < 30 && posY < 30);

                const rot = (Math.random() - 0.5) * 40;

                img.style.left = posX + '%';
                img.style.top = posY + '%';
                img.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
                
                wrapper.appendChild(img);
            }

            setTimeout(() => {
                document.querySelectorAll('.photo').forEach(p => p.classList.add('show'));
                document.querySelectorAll('.nav-link').forEach(item => item.classList.add('show'));
            }, 100);

            initSmoothParallax();
        }

        function initSmoothParallax() {
            const photos = document.querySelectorAll('.photo');
            let mouseX = 0, mouseY = 0;
            let mx = 0, my = 0;

            window.addEventListener('mousemove', e => {
                mouseX = (e.clientX / window.innerWidth - 0.5);
                mouseY = (e.clientY / window.innerHeight - 0.5);
            });

            window.addEventListener('touchmove', e => {
                if (e.touches.length > 0) {
                    mouseX = (e.touches[0].clientX / window.innerWidth - 0.5);
                    mouseY = (e.touches[0].clientY / window.innerHeight - 0.5);
                }
            });

            function animate() {
                mx += (mouseX - mx) * 0.1;
                my += (mouseY - my) * 0.1;

                photos.forEach((img, i) => {
                    const speed = 4 + i * 0.8;
                    const moveX = mx * speed;
                    const moveY = my * speed;
                    const rot = parseFloat(img.style.transform.match(/rotate\((.*?)deg\)/)[1] || 0);
                    
                    img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) translate(${moveX}px, ${moveY}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
