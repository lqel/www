<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUO / LUO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
        }

        .center-text {
            font-size: 8vw;
            letter-spacing: 0.1em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
            font-family: "Comic Sans MS", "Arial Rounded MT Bold", "Helvetica Rounded", sans-serif;
            font-weight: 900;
            
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #c9f4ff, #a1c4fd);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bgShift 8s ease infinite;
        }

        @keyframes bgShift {
            0%{background-position: 0% 50%}
            50%{background-position: 100% 50%}
            100%{background-position: 0% 50%}
        }

        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            font-family: "Comic Sans MS", "Arial Rounded MT Bold", sans-serif !important;
            animation: slashMove 7s ease-in-out infinite;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #c9f4ff, #a1c4fd);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding-bottom: 0.1em;
            line-height: 1.2 !important;
        }
        @keyframes slashMove {
            0%   { transform: translate(0, 0); }
            14%  { transform: translate(5px, -7px); }
            18%  { transform: translate(-6px, 5px); }
            24%  { transform: translate(3px, -4px); }
            28.5%{ transform: translate(0, 0); }
            100% { transform: translate(0, 0); }
        }

        .main-info {
            position: absolute;
            right: 2rem; bottom: 2rem;
            font-size: 1.15rem; opacity: 1; transition: opacity 1s ease;
            font-family: "YouYuan", "幼圆", sans-serif !important; font-weight: 50;
            background: linear-gradient(45deg, #ff85a2, #74b6ff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            z-index: 888;
        }
        .main-info.hidden { opacity: 0; pointer-events: none; }

        .nav-link {
            position: absolute;
            top: 58%;
            font-size: 1.15rem;
            font-family: "YouYuan", "幼圆", sans-serif !important;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            z-index: 888;
            padding: 12px 26px;
            border-radius: 50px;
            
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #c9f4ff, #a1c4fd);
            
            background-size: 300% 300%;
            animation: bgShift 8s ease infinite;
            box-shadow: 0 6px 15px rgba(255, 153, 204, 0.25);
        }

        .nav-link.show { opacity: 1; }
        .nav-link:hover { transform: scale(1.05); }
        .nav-left { left: 8%; }
        .nav-right { right: 8%; }

        .photo-wrapper {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1; overflow: hidden;
        }

        .photo {
            position: absolute; object-fit: cover;
            opacity: 0;
            border-radius: 50%;
            transform-origin: center;
            transform: translate(-50%, -50%) scale(0.3);
            transition: all 2.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-mask-image: radial-gradient(circle, white 90%, rgba(255,255,255,0.75) 100%);
            mask-image: radial-gradient(circle, white 90%, rgba(255,255,255,0.75) 100%);
        }
        .photo.show {
            opacity: 0.95;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>
    <div class="center-text"> LUO<span class="slash">/</span>LUO </div>
    <div class="main-info">洛宝家的礼物相关..</div>

    <a href="https://www.kdocs.cn/l/cpOS6o0WxM5F" target="_blank" class="nav-link nav-left">积分查询</a>
    <a href="https://f.wps.cn/g/zuMcXanF/" target="_blank" class="nav-link nav-right">礼物登记</a>

    <div class="photo-wrapper" id="photoWrapper"></div>

    <script>
        const images = [];
        for (let i = 0; i < 14; i++) {
            images.push(`images/${String.fromCharCode(97 + i)}.jpg`);
        }

        let mouseX = 0, mouseY = 0;
        document.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        document.addEventListener("touchmove", (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        setTimeout(() => {
            document.querySelector('.center-text').classList.add('moved');
            document.querySelector('.main-info').classList.add('hidden');
            setTimeout(initPhotos, 1000);
        }, 5000);

        function initPhotos() {
            const wrapper = document.getElementById('photoWrapper');
            const imgSize = Math.max(window.innerWidth, window.innerHeight) / 3.2;
            const safeLeft = window.innerWidth * 0.32;
            const safeTop = window.innerHeight * 0.22;
            const positions = [];
            const minDist = imgSize * 0.6;

            for (let i = 0; i < images.length; i++) {
                let x, y, valid;
                let attempts = 0;

                do {
                    valid = true;
                    x = Math.random() * window.innerWidth;
                    y = Math.random() * window.innerHeight;

                    if (x < safeLeft && y < safeTop) {
                        valid = false;
                        continue;
                    }

                    for (let pos of positions) {
                        const dx = x - pos.x;
                        const dy = y - pos.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < minDist) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                } while (!valid && attempts < 200);

                positions.push({x, y});
                const img = document.createElement('img');
                img.src = images[i];
                img.className = 'photo';
                img.style.width = imgSize + 'px';
                img.style.height = imgSize + 'px';
                const rot = (Math.random() - 0.5) * 40;
                img.style.left = x + 'px';
                img.style.top = y + 'px';
                img.dataset.ox = x;
                img.dataset.oy = y;
                img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(0.3)`;
                wrapper.appendChild(img);
            }

            setTimeout(() => {
                document.querySelectorAll('.photo').forEach(p => p.classList.add('show'));
                document.querySelectorAll('.nav-link').forEach(item => item.classList.add('show'));
                startBalloonPhysics();
            }, 100);
        }

        // 🎈 最强禁区锁 + 气球物理
        function startBalloonPhysics() {
            const photos = document.querySelectorAll('.photo');
            const avoidRadius = 130;
            const avoidForce = 18;
            const safeLeft = window.innerWidth * 0.32;
            const safeTop = window.innerHeight * 0.22;
            const margin = 80;

            photos.forEach(img => {
                let ox = parseFloat(img.dataset.ox);
                let oy = parseFloat(img.dataset.oy);
                let x = 0, y = 0;
                let vx = (Math.random() - 0.5) * 0.3;
                let vy = (Math.random() - 0.5) * 0.3;
                const baseRot = img.style.transform.match(/rotate\((.*?)deg\)/)[1];

                function update() {
                    x += vx;
                    y += vy;
                    if (Math.abs(x) > 12) vx *= -1;
                    if (Math.abs(y) > 12) vy *= -1;

                    const rect = img.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const dx = cx - mouseX;
                    const dy = cy - mouseY;
                    const dist = Math.hypot(dx, dy);
                    if (dist < avoidRadius) {
                        const angle = Math.atan2(dy, dx);
                        x += Math.cos(angle) * avoidForce * (1 - dist / avoidRadius);
                        y += Math.sin(angle) * avoidForce * (1 - dist / avoidRadius);
                    }

                    const finalX = ox + x;
                    const finalY = oy + y;

                    // 🔥 最强锁：只要进禁区 → 直接弹回安全区
                    if (finalX < safeLeft + margin && finalY < safeTop + margin) {
                        x = 0;
                        y = 0;
                    }

                    img.style.transform = `translate(-50%, -50%) rotate(${baseRot}deg) scale(1) translate(${x}px, ${y}px)`;
                    requestAnimationFrame(update);
                }
                update();
            });
        }
    </script>
</body>
</html>
