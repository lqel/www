<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%25 y=%2255%25 font-size=%2260%25 font-family=%22HarmonyOS Sans Regular%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22black%22>/A</text></svg>">
    <title>Home / Anthvia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'HarmonyOS Sans Regular', 'HarmonyOS Sans', sans-serif;
            font-weight: 400;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        .center-text {
            font-size: 8vw;
            color: #000000;
            letter-spacing: 0.06em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
        }

        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            clip-path: inset(12% 0 12% 0);
            animation: slashSlant 7s ease-in-out infinite;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes slashSlant {
            0%   { opacity: 1; transform: translate(0, 0) translateZ(0); }
            14%  { opacity: 1; transform: translate(0, 0) translateZ(0); }
            18%  { opacity: 0; transform: translate(15vw, -36vw) translateZ(0); }
            24%  { opacity: 0; transform: translate(-15vw, 36vw) translateZ(0); }
            28.5%{ opacity: 1; transform: translate(0, 0) translateZ(0); }
            100% { opacity: 1; transform: translate(0, 0) translateZ(0); }
        }

        .footer-text {
            position: absolute;
            color: #000000;
            bottom: 25%;
            text-align: left;
        }

        .left-bottom {
            left: 2rem;
            font-size: 1.2rem;
            opacity: 0;
            line-height: 1.5;
            pointer-events: none;
        }

        .right-bottom {
            right: 2rem;
            padding-top: 0.2em;
            font-size: 0.9rem;
            opacity: 1;
            transition: opacity 1s ease;
        }
        .right-bottom.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 🔥 图片铺满全屏优化 */
        .photo-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .photo {
            position: absolute;
            width: 28vw;
            max-width: 320px;
            min-width: 180px;
            aspect-ratio: 3/2;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease;
            /* 边缘柔化，无边框 */
            -webkit-mask-image: radial-gradient(ellipse at center, black 65%, transparent 100%);
            mask-image: radial-gradient(ellipse at center, black 65%, transparent 100%);
            will-change: transform;
        }

        .photo.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="center-text">
        ANTHV<span class="slash">/</span>A
    </div>

    <div class="footer-text left-bottom">
        一点星尘（深圳）科技有限公司<br>
        Anthvia Limited
    </div>
    
    <div class="footer-text right-bottom" id="email"></div>
    <div class="photo-wrapper" id="photoWrapper"></div>

    <script>
        document.getElementById("email").innerText = "contact" + "@" + "anthvia.com";

        // 🔥 自动生成 a.jpg ~ n.jpg（14张）
        const images = [];
        const start = 'a'.charCodeAt(0);
        for (let i = 0; i < 14; i++) {
            images.push(`images/${String.fromCharCode(start + i)}.jpg`);
        }

        // 5秒后移动LOGO
        setTimeout(() => {
            document.querySelector('.center-text').classList.add('moved');
            document.querySelector('.right-bottom').classList.add('hidden');
            setTimeout(initPhotos, 1000);
        }, 5000);

        // 🔥 固定6张 + 均匀分布 + 放大3倍
        function initPhotos() {
            const wrapper = document.getElementById('photoWrapper');
            const count = 6; // 固定6张
            const selected = images.sort(() => Math.random() - 0.5).slice(0, count);

            selected.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'photo';
                
                // 随机角度 -18° ~ 18°
                const rot = (Math.random() * 36) - 18;
                
                // 🔥 均匀分布，不扎堆
                const step = 100 / count;
                const base = i * step;
                const posX = Math.min(98, Math.max(2, base + Math.random() * (step * 0.7)));
                const posY = Math.min(95, Math.max(5, Math.random() * 90));

                img.style.left = posX + '%';
                img.style.top = posY + '%';
                // 🔥 放大 3 倍
                img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(3)`;

                wrapper.appendChild(img);
            });

            setTimeout(() => {
                document.querySelectorAll('.photo').forEach(p => p.classList.add('show'));
            }, 100);

            initParallax();
        }

        // 🔥 每张独立物理浮动效果
        function initParallax() {
            const photos = document.querySelectorAll('.photo');
            let mouseX = 0, mouseY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2.2;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 2.2;
            });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2.2;
                    mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2.2;
                }
            });

            function animate() {
                photos.forEach((img, i) => {
                    const speed = 12 + i * 2.5;
                    const moveX = mouseX * speed;
                    const moveY = mouseY * speed;
                    const baseRot = parseFloat(img.style.transform.match(/rotate\((.*?)deg\)/)[1] || 0);
                    // 🔥 放大3倍 + 浮动 + 角度
                    img.style.transform = `translate(-50%, -50%) rotate(${baseRot}deg) scale(3) translate(${moveX}px, ${moveY}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
